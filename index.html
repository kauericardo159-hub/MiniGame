<!DOCTYPE html>
<html>
  <head>
    <title>Meu Mini Jogo 3D</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <a-scene>
      <a-assets>
        <a-asset-item id="meu-mapa" src="mapa.glb"></a-asset-item>
      </a-assets>

      <a-entity gltf-model="#meu-mapa" position="0 0 -5" scale="1 1 1"></a-entity>

      <a-sky color="#87CEEB"></a-sky> <a-light type="ambient" color="#BBB"></a-light>
      <a-light type="directional" color="#FFF" intensity="0.6" position="-1 1 1"></a-light>

      <a-entity camera look-controls wasd-controls position="0 1.6 0"></a-entity>
    </a-scene>

  </body>
</html>
