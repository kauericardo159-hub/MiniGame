<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Meu Jogo 3D - Mapa Prisma 3D</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene>
        <a-assets>
            <a-asset-item id="mapa-modelo" src="mapa.glb"></a-asset-item>
        </a-assets>

        <a-entity gltf-model="#mapa-modelo" position="0 0 -5" scale="10 10 10"></a-entity>

        <a-sky color="#87CEEB"></a-sky> 
        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" position="1 2 1" intensity="0.5"></a-light>

        <a-entity camera look-controls wasd-controls position="0 1.6 0"></a-entity>
    </a-scene>

</body>
</html>
