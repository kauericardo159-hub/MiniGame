<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Roblox Web - Localizador de Modelo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body style="margin: 0; background: #111; overflow: hidden;">
    <div id="status" style="position: absolute; color: lime; padding: 10px; font-family: monospace;">Buscando Cubo no espaço...</div>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000); // Fundo preto para você ver qualquer ponto branco
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 100000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.AmbientLight(0xffffff, 2);
        scene.add(light);

        const loader = new THREE.GLTFLoader();
        // O link que montamos do seu GitHub
        const url = "https://raw.githubusercontent.com/kauericardo159-hub/MiniGame/main/Cubo.glb";

        loader.load(url, (gltf) => {
            const model = gltf.scene;
            scene.add(model);

            // --- TRUQUE MÁGICO: ENCONTRAR O MODELO ---
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());

            // Move a câmera para perto do objeto, não importa onde ele esteja
            camera.position.set(center.x, center.y, center.z + (size.y * 2) + 50);
            camera.lookAt(center);

            document.getElementById('status').innerText = "✅ ACHEI! Local: Y=" + Math.round(center.y);
        }, 
        undefined, 
        (err) => {
            document.getElementById('status').innerText = "❌ Erro: Link quebrado ou arquivo corrompido.";
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
