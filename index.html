<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Meu Jogo Mobile 3D</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <a-scene vr-mode-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="mapa" src="mapa.glb"></a-asset-item>
      </a-assets>

      <a-entity 
        gltf-model="#mapa" 
        position="0 0 -10" 
        scale="15 15 15"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
      </a-entity>

      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" position="2 4 -3" intensity="0.8"></a-light>

      <a-sky color="#222"></a-sky> <a-entity camera look-controls position="0 1.6 0"></a-entity>

    </a-scene>
  </body>
</html>
