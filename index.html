<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox Web Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #status-ui { position: absolute; top: 10px; left: 10px; color: #0f0; font-family: monospace; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #0f0; z-index: 100; }
    </style>
</head>
<body>

    <div id="status-ui">STATUS: <span id="msg">Iniciando...</span></div>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Iluminação (Hemisférica para brilhar o modelo)
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));

        // Grid de referência (Baseplate)
        scene.add(new THREE.GridHelper(100, 50));

        const loader = new THREE.GLTFLoader();
        
        // LINK CORRIGIDO: Apontando para a pasta Documents onde o arquivo está!
        const url = "https://raw.githubusercontent.com/kauericardo159-hub/MiniGame/main/Documents/Cubo.glb";

        loader.load(url, (gltf) => {
            scene.add(gltf.scene);
            gltf.scene.scale.set(10, 10, 10); // Aumenta o tamanho do modelo
            document.getElementById('msg').innerText = "✅ CUBO ONLINE!";
        }, 
        (xhr) => {
            let p = Math.round((xhr.loaded / xhr.total) * 100);
            document.getElementById('msg').innerText = "Baixando: " + p + "%";
        }, 
        (err) => {
            document.getElementById('msg').innerText = "❌ ERRO AO BUSCAR ARQUIVO";
            console.error(err);
        });

        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        // Rotação por toque
        let touchX = 0;
        document.addEventListener('touchmove', (e) => {
            let dx = e.touches[0].clientX - touchX;
            scene.rotation.y += dx * 0.01;
            touchX = e.touches[0].clientX;
        });
        document.addEventListener('touchstart', (e) => { touchX = e.touches[0].clientX; });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
