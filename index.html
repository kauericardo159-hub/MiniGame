<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <title>MiniGame Dev Mode</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        /* Estilo do Explorer (Janela Flutuante) */
        #explorer {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 200px;
            max-height: 80vh;
            background: rgba(0, 0, 0, 0.8);
            color: #0f0;
            font-family: monospace;
            padding: 10px;
            border: 1px solid #0f0;
            border-radius: 5px;
            z-index: 999;
            overflow-y: auto;
            font-size: 12px;
        }
        #explorer h3 { margin-top: 0; color: #fff; border-bottom: 1px solid #0f0; }
        .item { margin-bottom: 5px; cursor: pointer; }
        .item:hover { background: #222; }
        .status-ok { color: #0f0; }
        .status-err { color: #f00; }
    </style>
</head>
<body>

    <div id="explorer">
        <h3>📂 EXPLORER</h3>
        <div id="lista-objetos">Buscando objetos...</div>
        <hr>
        <div id="status-mapa">Mapa: Verificando...</div>
    </div>

    <a-scene vr-mode-ui="enabled: false">
        <a-assets>
            <a-asset-item id="meu-mapa" src="mapa.glb"></a-asset-item>
        </a-assets>

        <a-entity id="Entidade_Mapa" gltf-model="#meu-mapa" position="0 0 -5" scale="1 1 1"></a-entity>

        <a-box id="Cubo_Teste" position="-2 0.5 -3" color="red"></a-box>
        <a-sphere id="Esfera_Teste" position="2 0.5 -3" color="blue"></a-sphere>

        <a-sky color="#222"></a-sky>
        <a-light type="ambient" intensity="1"></a-light>
        <a-camera position="0 1.6 0"></a-camera>
    </a-scene>

    <script>
        // Lógica para atualizar o Explorer
        function atualizarExplorer() {
            const lista = document.getElementById('lista-objetos');
            const objetos = document.querySelectorAll('a-entity, a-box, a-sphere, a-light');
            
            lista.innerHTML = ""; // Limpa a lista
            
            objetos.forEach(obj => {
                const id = obj.id || obj.tagName.toLowerCase();
                const div = document.createElement('div');
                div.className = "item";
                div.innerHTML = `🔹 ${id}`;
                lista.appendChild(div);
            });
        }

        // Verifica se o mapa carregou de verdade
        const mapaEntidade = document.querySelector('#Entidade_Mapa');
        const statusMapa = document.getElementById('status-mapa');

        mapaEntidade.addEventListener('model-loaded', () => {
            statusMapa.innerHTML = "Mapa: <span class='status-ok'>CARREGADO ✅</span>";
            atualizarExplorer();
        });

        mapaEntidade.addEventListener('model-error', () => {
            statusMapa.innerHTML = "Mapa: <span class='status-err'>ERRO ❌</span>";
            console.error("Não foi possível carregar o mapa.glb");
        });

        // Rodar ao iniciar
        window.onload = atualizarExplorer;
    </script>
</body>
</html>
