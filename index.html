<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>MiniGame - Player Bloco</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <a-scene vr-mode-ui="enabled: false" background="color: #6EBAFF">
      
      <a-assets>
        <a-asset-item id="mapa" src="https://kauericardo159-hub.github.io/MiniGame/mapa.glb"></a-asset-item>
      </a-assets>

      <a-entity gltf-model="#mapa" position="0 0 0" scale="10 10 10"></a-entity>

      <a-box id="player-block" 
             position="0 1 0" 
             width="1" height="1" depth="1" 
             color="#2196F3">
        
        <a-entity camera look-controls wasd-controls position="0 0.8 0"></a-entity>
        
      </a-box>

      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" position="1 3 2" intensity="0.5"></a-light>

    </a-scene>

    <script>
      // Pequeno código para garantir que o bloco siga a direção da câmera
      const player = document.querySelector('#player-block');
      const camera = document.querySelector('[camera]');

      // Isso ajuda a mover o bloco junto com a visão no celular
      window.addEventListener('keydown', (e) => {
        // Se usar teclado (WASD), o bloco se move
        // No celular, o movimento padrão do A-Frame é arrastar o dedo
      });
    </script>
  </body>
</html>
