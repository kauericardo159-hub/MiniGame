<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>MiniGame 3D - Mapa</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden; background: #000;">

    <a-scene vr-mode-ui="enabled: false" background="color: #6EBAFF">
      
      <a-assets>
        <a-asset-item id="mapa" src="https://kauericardo159-hub.github.io/MiniGame/mapa.glb"></a-asset-item>
      </a-assets>

      <a-entity 
        gltf-model="#mapa" 
        position="0 0 -3" 
        scale="5 5 5">
      </a-entity>

      <a-light type="ambient" intensity="1.2"></a-light>
      <a-light type="point" intensity="1" position="2 4 4"></a-light>

      <a-entity camera position="0 1.6 0"></a-entity>

    </a-scene>

  </body>
</html>
