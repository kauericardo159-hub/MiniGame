<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox Web Teste</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #333; }
        #debug { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.8); padding: 10px; font-family: monospace; z-index: 100; }
    </style>
</head>
<body>

    <div id="debug">
        Status: <span id="log">Iniciando...</span>
    </div>

    <script>
        // 1. Configuração Básica
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Luz
        const light = new THREE.AmbientLight(0xffffff, 1);
        scene.add(light);

        // 3. CUBO DE TESTE (Se você vir isso, o motor está OK)
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const cube = new THREE.Mesh(geometry, material);
        cube.position.set(0, 0.5, -3);
        scene.add(cube);

        // 4. CARREGAR SEU MODELO (Link Direto)
        const loader = new THREE.GLTFLoader();
        // ATENÇÃO: Verifique se o C de Cubo está maiúsculo no GitHub!
        const url = "https://kauericardo159-hub.github.io/MiniGame/Cubo.glb";

        document.getElementById('log').innerText = "Baixando Cubo.glb...";

        loader.load(url, 
            (gltf) => {
                const model = gltf.scene;
                model.scale.set(10, 10, 10); // Aumenta bem o tamanho
                model.position.set(0, 0, 0);
                scene.add(model);
                document.getElementById('log').innerText = "✅ MODELO CARREGADO!";
                cube.visible = false; // Esconde o cubo vermelho se o mapa carregar
            },
            undefined,
            (error) => {
                document.getElementById('log').innerText = "❌ ERRO: Arquivo não encontrado ou inválido.";
                console.error(error);
            }
        );

        camera.position.z = 5;
        camera.position.y = 2;

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
