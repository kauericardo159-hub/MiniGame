<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Meu Mapa 3D</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <a-scene vr-mode-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="meu-mapa" src="mapa.glb"></a-asset-item>
      </a-assets>

      <a-entity 
        gltf-model="#meu-mapa" 
        position="0 0 0" 
        scale="20 20 20">
      </a-entity>

      <a-light type="ambient" intensity="0.8"></a-light>
      <a-light type="directional" position="1 5 2" intensity="0.6"></a-light>

      <a-sky color="#87CEEB"></a-sky>

      <a-entity camera look-controls wasd-controls position="0 5 0"></a-entity>

    </a-scene>
  </body>
</html>
